<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#07101e"><link rel="manifest" href="/manifest.json"><link rel="stylesheet" href="/style.css?v=13"><title>Turni Universali</title></head><body><div id="setup" class="overlay"><div class="panel"><button id="closeSetup" class="close-x hide" onclick="closeSetup()" aria-label="Annulla">✕</button><h1>Turni Universali</h1><p>Scegli la turnazione</p><button onclick="setType('321')">Settimanale<span class="seq"><i class="chip t3">3</i><b>→</b><i class="chip t2">2</i><b>→</b><i class="chip t1">1</i></span></button><button onclick="setType('12')">Settimanale<span class="seq"><i class="chip t1">1</i><b>→</b><i class="chip t2">2</i></span></button><button onclick="setType('custom')">Ciclo continuo personalizzato<span class="seq"><i class="chip t1">1</i><i class="chip t2">2</i><i class="chip t3">3</i><i class="chip R">R</i></span></button><div id="form"></div></div></div><main><header><div><small>CALENDARIO DI LAVORO</small><h1>Turni Universali</h1></div><div class="header-actions"><div class="legend-wrap"><button class="icon-btn" onclick="toggleLegend(event)" aria-label="Legenda">📋</button><div id="legendDropdown" class="legend-dropdown hide"><div class="legend"><span><i class="lg1"></i>1° turno</span><span><i class="lg2"></i>2° turno</span><span><i class="lg3"></i>3° turno</span><span><i class="lgr"></i>Riposo</span><span><i class="lgf"></i>Ferie</span><span><i class="lgm"></i>Malattia</span><span><i class="lgp"></i>Permesso</span><span><i class="lgt"></i>Giorno corrente</span></div></div></div><button class="icon-btn" onclick="resetConfig()" aria-label="Configurazione">⚙️</button></div></header><section class="card result-card"><p class="result-label">Scegli una data</p><div class="date-picker-wrap"><span id="datePickerText"></span><input id="datePicker" type="date" onchange="showDateShift()"></div><div id="shiftBadge" class="shift-badge"></div><p id="shiftInfo"></p></section><section class="card"><div class="nav"><button onclick="move(-1)">‹</button><div class="nav-center"><h2 id="month"></h2></div><button onclick="move(1)">›</button></div><div class="week"><span>L</span><span>M</span><span>M</span><span>G</span><span>V</span><span>S</span><span>D</span></div><div id="cal"></div></section><section class="card"><h2>Statistiche <select id="year" onchange="stats()"></select></h2><div class="stats"><div><b id="f">0</b>Ferie</div><div><b id="m">0</b>Malattia</div><div><b id="p">0</b>Ore permesso</div></div><label>Ferie disponibili<input id="allow" type="number" min="0" onchange="saveAllow()"></label><h3 id="remain"></h3></section></main><div id="modal" class="overlay hide"><div class="panel modal-panel"><h2 id="date"></h2><p id="planned"></p><button class="modal-btn btn-ferie" onclick="mark('ferie')">🏖️ Ferie</button><button class="modal-btn btn-malattia" onclick="mark('malattia')">🤒 Malattia</button><button class="modal-btn btn-permesso" onclick="showOrePicker()">🟡 Permesso</button><button class="modal-btn btn-ripristina" onclick="mark('')">↩️ Ripristina turno</button><button class="modal-close" onclick="closeModal()">Chiudi</button></div></div><div id="orePanel" class="overlay hide"><div class="panel ore-panel"><h2>Ore di permesso</h2><p>Scegli quante ore di permesso hai utilizzato.</p><div class="ore-grid"><button onclick="mark('permesso-1')">1 ora</button><button onclick="mark('permesso-2')">2 ore</button><button onclick="mark('permesso-3')">3 ore</button><button onclick="mark('permesso-4')">4 ore</button><button onclick="mark('permesso-5')">5 ore</button><button onclick="mark('permesso-6')">6 ore</button><button onclick="mark('permesso-7')">7 ore</button><button onclick="mark('permesso-8')">8 ore</button></div><button class="modal-close" onclick="closeOrePanel()">Annulla</button></div></div><script src="/script.js?v=9"></script><script src="https://replit-cdn.com/replit-pill/replit-pill.global.js" data-repl-id="b4dbd775-062a-478c-808f-ff2430a0ae94"></script></body></html>
